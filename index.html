<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>挿入ソート 体感学習＋疑似コード</title>
<style>
  :root{
    --bg:#f3f4f6;
    --panel:#ffffff;
    --blue:#2b78d4;
    --green:#3b8f3b;
    --red:#d73333;
    --gold:#df9b16;
    --pink:#e85ba3;
    --pink-bg:#ffe1ef;
    --card-border:#3e546b;
    --code-highlight:#fff3bf;
    --guide:#6d76b8;
  }

  *{box-sizing:border-box}

  body{
    margin:0;
    background:var(--bg);
    font-family:"Helvetica Neue", Arial, sans-serif;
    color:#222;
  }

  .header{
    position:sticky;
    top:0;
    z-index:100;
    background:#fff;
    box-shadow:0 2px 10px rgba(0,0,0,.08);
    text-align:center;
    padding:10px 12px 12px;
  }

  .header h1{
    margin:0 0 6px;
    font-size:22px;
    font-weight:800;
  }

  #hint-text{
    min-height:42px;
    margin:0 auto 8px;
    max-width:1100px;
    font-size:15px;
    line-height:1.45;
    font-weight:800;
    color:var(--red);
  }

  .controls button{
    background:#31485e;
    color:#fff;
    border:none;
    border-radius:9px;
    padding:8px 15px;
    margin:0 5px;
    font-size:14px;
    font-weight:700;
    cursor:pointer;
  }

  .controls button:disabled{
    background:#bfc6cd;
    cursor:default;
  }

  .main{
    max-width:1480px;
    margin:12px auto 20px;
    padding:0 8px;
    display:grid;
    grid-template-columns:minmax(760px, 1fr) 560px;
    gap:2px;
    align-items:start;
  }

  .workspace{
    width:100%;
    padding-left:56px;
  }

  .list-wrapper{
    position:relative;
    background:var(--panel);
    border:1px solid #ddd;
    border-radius:24px;
    padding:88px 20px 250px 28px;
    min-width:760px;
    overflow:visible;
  }

  .list-container{
    display:flex;
    gap:28px;
    align-items:flex-start;
    position:relative;
    z-index:5;
  }

  .cell{
    width:86px;
    min-height:340px;
    display:flex;
    flex-direction:column;
    align-items:center;
    position:relative;
    flex:0 0 auto;
  }

  .top-marker{
    height:56px;
    display:flex;
    align-items:flex-end;
    justify-content:center;
    font-weight:900;
    font-size:14px;
    line-height:1.05;
    text-align:center;
    white-space:pre-line;
  }

  .card{
    width:78px;
    height:106px;
    border:5px solid var(--card-border);
    border-radius:18px;
    background:#fff;
    display:flex;
    align-items:center;
    justify-content:center;
    font-size:34px;
    font-weight:900;
    box-shadow:0 3px 9px rgba(0,0,0,.08);
    user-select:none;
    cursor:grab;
    position:relative;
    z-index:2;
    transition:
      left .18s ease,
      transform .18s ease,
      background-color .18s ease,
      border-color .18s ease,
      box-shadow .18s ease,
      opacity .18s ease;
  }

  .card:active{cursor:grabbing}

  .card.is-i{
    border-color:var(--blue);
    box-shadow:0 0 0 5px rgba(43,120,212,.13), 0 3px 9px rgba(0,0,0,.08);
  }

  .card.is-compared{
    border-color:var(--green);
    background:#dfe9df;
  }

  .card.in-hozon{
    border-color:var(--gold);
    background:#fffaf0;
  }

  .card.sorted-flash{
    animation:sortedFlash 1s ease-in-out 2;
  }

  .card.sync-hozon{
    animation:syncPulse 1.05s ease-in-out infinite;
    z-index:4;
  }

  .card.in-hozon.sync-hozon{
    background:#fff6d8 !important;
    border-color:#df9b16 !important;
  }

  .card.is-compared.sync-hozon{
    background:#e5f5e5 !important;
    border-color:#3b8f3b !important;
  }

  @keyframes sortedFlash{
    0%{background:#fff;border-color:var(--card-border)}
    25%{background:var(--pink-bg);border-color:var(--pink)}
    50%{background:#fff;border-color:var(--pink)}
    75%{background:var(--pink-bg);border-color:var(--pink)}
    100%{background:#fff;border-color:var(--card-border)}
  }

  @keyframes syncPulse{
    0%{
      transform:scale(1);
      box-shadow:
        0 0 0 0 rgba(223,155,22,0),
        0 3px 9px rgba(0,0,0,.08);
      opacity:1;
    }
    35%{
      transform:scale(1.14);
      box-shadow:
        0 0 0 14px rgba(120,170,120,.16),
        0 0 22px rgba(120,170,120,.22),
        0 6px 16px rgba(0,0,0,.12);
      opacity:.96;
    }
    70%{
      transform:scale(1.09);
      box-shadow:
        0 0 0 8px rgba(223,155,22,.12),
        0 0 16px rgba(223,155,22,.18),
        0 5px 13px rgba(0,0,0,.10);
      opacity:1;
    }
    100%{
      transform:scale(1);
      box-shadow:
        0 0 0 0 rgba(223,155,22,0),
        0 3px 9px rgba(0,0,0,.08);
      opacity:1;
    }
  }

  .index-label{
    margin-top:10px;
    margin-bottom:10px;
    color:#8c8c8c;
    font-weight:800;
    font-size:13px;
    line-height:1;
    position:relative;
    z-index:9;
    background:rgba(255,255,255,.92);
    padding:0 4px;
    border-radius:6px;
  }

  .bottom-marker{
    margin-top:18px;
    height:108px;
    display:flex;
    flex-direction:column;
    align-items:center;
    justify-content:flex-start;
    font-weight:900;
    line-height:1.05;
    text-align:center;
    position:relative;
    z-index:8;
    white-space:pre-line;
  }

  .j-marker{
    color:var(--red);
    font-size:20px;
    font-weight:900;
  }

  .insert-marker-top{
    color:var(--green);
    font-size:19px;
    font-weight:900;
  }

  .insert-marker-bottom{
    color:var(--green);
    font-size:16px;
    font-weight:900;
    margin-top:2px;
  }

  .sorted-label{
    margin-top:5px;
    color:var(--pink);
    font-size:13px;
    font-weight:900;
    border:2px solid rgba(232,91,163,.45);
    background:rgba(255,225,239,.96);
    border-radius:999px;
    padding:2px 7px;
  }

  #j-range-highlight{
    position:absolute;
    display:none;
    pointer-events:none;
    z-index:1;
    background:rgba(244, 220, 90, .22);
    border:5px dashed var(--gold);
    border-radius:20px;
  }

  #j-range-label{
    position:absolute;
    display:none;
    pointer-events:none;
    z-index:7;
    white-space:nowrap;
    color:#aa6f00;
    font-size:22px;
    font-weight:900;
  }

  .hozon-container{
    position:absolute;
    left:0;
    bottom:26px;
    z-index:6;
    display:flex;
    flex-direction:column;
    align-items:center;
    transition:left .18s ease;
  }

  .hozon-label{
    color:var(--gold);
    font-size:18px;
    font-weight:900;
    margin-bottom:6px;
    line-height:1;
  }

  .slot{
    width:104px;
    height:142px;
    border:5px solid var(--gold);
    border-radius:22px;
    background:#fffaf0;
    position:relative;
    display:flex;
    align-items:center;
    justify-content:center;
  }

  .slot-inner{
    position:absolute;
    width:78px;
    height:106px;
    border:5px solid rgba(223,155,22,.9);
    border-radius:18px;
    pointer-events:none;
  }

  .drop-hover{
    outline:4px solid rgba(43,120,212,.25);
    outline-offset:5px;
    border-radius:16px;
  }

  .code-panel{
    background:#fff;
    border:1px solid #ddd;
    border-radius:24px;
    padding:12px 14px 14px;
    position:sticky;
    top:82px;
  }

  .code-title{
    font-size:18px;
    font-weight:900;
    margin-bottom:6px;
  }

  .code-lines{
    font-family:"Times New Roman","Hiragino Mincho ProN","Yu Mincho","MS PMincho",serif;
  }

  .code-line{
    display:grid;
    grid-template-columns:48px 1fr;
    align-items:center;
    min-height:44px;
    padding:1px 6px;
    border-radius:10px;
    transition:background-color .15s ease, box-shadow .15s ease;
  }

  .code-line.active{
    background:var(--code-highlight);
    box-shadow:inset 0 0 0 2px #e4c84a;
  }

  .code-no{
    font-size:18px;
    color:#000;
    text-align:right;
    padding-right:8px;
    font-weight:700;
  }

  .code-body{
    display:flex;
    align-items:center;
    min-width:0;
  }

  .indent-area{
    position:relative;
    height:40px;
    flex:0 0 auto;
  }

  .indent-col{
    position:absolute;
    top:0;
    bottom:0;
    width:28px;
  }

  .code-text{
    font-size:17px;
    line-height:1.2;
    white-space:nowrap;
    margin-left:2px;
  }

  @media (max-width: 1280px){
    .main{
      grid-template-columns:1fr;
      gap:10px;
    }
    .code-panel{
      position:static;
    }
    .workspace{
      padding-left:0;
    }
    .list-wrapper{
      min-width:0;
    }
  }
</style>
</head>
<body>
  <div class="header">
    <h1>挿入ソート (添字は1から)</h1>
    <div id="hint-text">読み込み中...</div>
    <div class="controls">
      <button id="backBtn" onclick="undo()">一つ戻る</button>
      <button onclick="initGame()">リセット</button>
    </div>
  </div>

  <div class="main">
    <div class="workspace">
      <div class="list-wrapper" id="list-wrapper">
        <div id="j-range-highlight"></div>
        <div id="j-range-label">← j の範囲 →</div>

        <div class="list-container" id="list-container"></div>

        <div class="hozon-container" id="hozon-container">
          <div class="hozon-label">hozon</div>
          <div
            class="slot"
            id="hozon-slot"
            ondrop="drop(event)"
            ondragover="allowDrop(event)"
            ondragleave="clearHover(event)"
          >
            <div class="slot-inner"></div>
          </div>
        </div>
      </div>
    </div>

    <div class="code-panel">
      <div class="code-title">対応する疑似コード</div>
      <div class="code-lines" id="code-lines"></div>
    </div>
  </div>

<script>
const pseudocode = [
  { no: 1, depth: 0, text: '', endDepths: [] },
  { no: 2, depth: 0, text: 'i を 2 から要素数( list ) まで 1 ずつ増やしながら', endDepths: [] },
  { no: 3, depth: 1, text: 'hozon ← list [ i ]', endDepths: [] },
  { no: 4, depth: 1, text: 'j を i − 1 から 1 まで 1 ずつ減らしながら，次を繰り返す', endDepths: [] },
  { no: 5, depth: 2, text: 'もし, list [ j ] < hozon ならば', endDepths: [] },
  { no: 6, depth: 3, text: 'list [ j+1 ] ← hozon', endDepths: [] },
  { no: 7, depth: 3, text: 'ループを離脱する☆', endDepths: [] },
  { no: 8, depth: 2, text: 'そうでなければ', endDepths: [] },
  { no: 9, depth: 3, text: 'list [ j+1 ] ← list [ j ]', endDepths: [] },
  { no: 10, depth: 3, text: 'もし j が 1 と等しければ', endDepths: [] },
  { no: 11, depth: 4, text: 'list [ 1 ] ← hozon', endDepths: [1,2,3,4] },
  { no: 12, depth: 0, text: 'list を表示する', endDepths: [] }
];

let state = {
  list: [],
  initialList: [],
  hozon: null,
  i: 1,
  j: 0,
  phase: "SAVE",
  history: [],
  flashSortedUntil: -1
};

function initCodePanel(){
  const listText = (state.initialList && state.initialList.length)
    ? state.initialList.join(', ')
    : '8, -3, 2, 1, 7';
  pseudocode[0].text = `hozon ← 0, list ← [ ${listText} ]`;

  const box = document.getElementById("code-lines");
  box.innerHTML = "";

  pseudocode.forEach(line => {
    const row = document.createElement("div");
    row.className = "code-line";
    row.id = `code-line-${line.no}`;

    const no = document.createElement("div");
    no.className = "code-no";
    no.textContent = `(${line.no})`;

    const body = document.createElement("div");
    body.className = "code-body";

    const indentArea = document.createElement("div");
    indentArea.className = "indent-area";
    indentArea.style.width = `${line.depth * 28}px`;
    renderIndent(indentArea, line.depth, line.endDepths || []);

    const text = document.createElement("div");
    text.className = "code-text";
    text.innerHTML = line.text;

    body.appendChild(indentArea);
    body.appendChild(text);

    row.appendChild(no);
    row.appendChild(body);
    box.appendChild(row);
  });
}

function renderIndent(container, depth, endDepths){
  container.innerHTML = "";
  const colWidth = 28;

  for(let d = 1; d <= depth; d++){
    const col = document.createElement("div");
    col.className = "indent-col";
    col.style.left = `${(d - 1) * colWidth}px`;

    const mark = document.createElement("div");
    mark.style.position = "absolute";
    mark.style.left = "2px";
    mark.style.top = "6px";
    mark.style.width = `${colWidth}px`;
    mark.style.height = "34px";
    mark.style.display = "flex";
    mark.style.alignItems = "center";
    mark.style.justifyContent = "center";
    mark.style.fontSize = "26px";
    mark.style.fontWeight = "700";
    mark.style.lineHeight = "1";
    mark.style.color = getCss("--guide");
    mark.style.fontFamily = "monospace";
    mark.textContent = endDepths.includes(d) ? "└" : "│";

    col.appendChild(mark);
    container.appendChild(col);
  }
}

function setActiveCodeLines(lines){
  document.querySelectorAll(".code-line").forEach(el => el.classList.remove("active"));
  lines.forEach(no => {
    const el = document.getElementById(`code-line-${no}`);
    if(el) el.classList.add("active");
  });
}

function makeRandomList(){
  const nums = [];
  while(nums.length < 5){
    const r = Math.floor(Math.random() * 90) + 10;
    if(!nums.includes(r)) nums.push(r);
  }
  return nums;
}

function initGame(){
  const newList = makeRandomList();
  state = {
    list: [...newList],
    initialList: [...newList],
    hozon: null,
    i: 1,
    j: 0,
    phase: "SAVE",
    history: [],
    flashSortedUntil: -1
  };
  initCodePanel();
  render();
}

function saveHistory(){
  state.history.push(JSON.stringify({
    list:[...state.list],
    initialList:[...state.initialList],
    hozon:state.hozon,
    i:state.i,
    j:state.j,
    phase:state.phase,
    flashSortedUntil:state.flashSortedUntil
  }));
}

function undo(){
  if(state.history.length === 0) return;
  const prev = JSON.parse(state.history.pop());
  state.list = prev.list;
  state.initialList = prev.initialList ?? [...prev.list];
  state.hozon = prev.hozon;
  state.i = prev.i;
  state.j = prev.j;
  state.phase = prev.phase;
  state.flashSortedUntil = prev.flashSortedUntil ?? -1;
  initCodePanel();
  render();
}

function render(){
  const listContainer = document.getElementById("list-container");
  listContainer.innerHTML = "";

  state.list.forEach((val, idx) => {
    const cell = document.createElement("div");
    cell.className = "cell";
    cell.dataset.idx = idx;
    cell.ondragover = allowDrop;
    cell.ondragleave = clearHover;
    cell.ondrop = drop;

    if(idx >= 1){
      cell.style.marginLeft = "10px";
    }

    const topMarker = document.createElement("div");
    topMarker.className = "top-marker";
    if(idx === state.i && state.i < state.list.length){
      topMarker.innerHTML = `<span style="color:${getCss('--blue')}">↓添字i</span>`;
    } else {
      topMarker.innerHTML = "&nbsp;";
    }
    cell.appendChild(topMarker);

    const card = document.createElement("div");
    const classes = ["card"];

    if(idx === state.i && state.i < state.list.length) classes.push("is-i");
    if((state.phase === "COMPARE_SHIFT" || state.phase === "INSERT") && idx === state.j && state.j >= 0) classes.push("is-compared");
    if(idx <= state.flashSortedUntil) classes.push("sorted-flash");

    const shouldBlink =
      state.hozon !== null &&
      (
        (state.phase === "COMPARE_SHIFT" && state.j >= 0 && state.list[state.j] < state.hozon && idx === state.j + 1) ||
        (state.phase === "INSERT" && ((state.j >= 0 && idx === state.j + 1) || (state.j < 0 && idx === 0)))
      );

    if(shouldBlink) classes.push("sync-hozon");

    card.className = classes.join(" ");
    card.textContent = val;
    card.draggable = true;
    card.id = `card-list-${idx}`;
    card.ondragstart = drag;
    cell.appendChild(card);

    const indexLabel = document.createElement("div");
    indexLabel.className = "index-label";
    indexLabel.textContent = `list[${idx + 1}]`;
    cell.appendChild(indexLabel);

    const bottom = document.createElement("div");
    bottom.className = "bottom-marker";

    if((state.phase === "COMPARE_SHIFT" || state.phase === "INSERT") && state.j >= 0 && idx === state.j){
      bottom.innerHTML = `<div class="j-marker">↑添字j</div>`;
    } else if(state.phase === "COMPARE_SHIFT" && state.j >= 0 && state.list[state.j] < state.hozon && idx === state.j + 1){
      bottom.innerHTML = `<div class="insert-marker-top">↑添字j+1</div><div class="insert-marker-bottom">ここに代入</div>`;
    } else if(state.phase === "INSERT" && idx === state.j + 1){
      if(state.j >= 0){
        bottom.innerHTML = `<div class="insert-marker-top">↑添字j+1</div><div class="insert-marker-bottom">ここに代入</div>`;
      } else {
        bottom.innerHTML = `<div class="insert-marker-top">↑1番目</div><div class="insert-marker-bottom">ここに代入</div>`;
      }
    } else if(idx <= state.flashSortedUntil){
      bottom.innerHTML = `<div class="sorted-label">整列済</div>`;
    } else {
      bottom.innerHTML = "&nbsp;";
    }

    cell.appendChild(bottom);
    listContainer.appendChild(cell);
  });

  const hozonSlot = document.getElementById("hozon-slot");
  Array.from(hozonSlot.querySelectorAll(".card")).forEach(el => el.remove());

  if(state.hozon !== null){
    const card = document.createElement("div");
    const hozonClasses = ["card", "in-hozon"];

    const shouldBlinkHozon =
      (state.phase === "COMPARE_SHIFT" && state.j >= 0 && state.list[state.j] < state.hozon) ||
      (state.phase === "INSERT");

    if(shouldBlinkHozon) hozonClasses.push("sync-hozon");

    card.className = hozonClasses.join(" ");
    card.textContent = state.hozon;
    card.draggable = true;
    card.id = "card-hozon";
    card.ondragstart = drag;
    hozonSlot.appendChild(card);
  }

  updateUI();
  updateHozonPosition();
  updateCodeHighlight();
}

function updateUI(){
  const hint = document.getElementById("hint-text");
  const backBtn = document.getElementById("backBtn");
  backBtn.disabled = state.history.length === 0;

  if(state.i >= state.list.length){
    hideRange();
    hint.innerHTML = "✨ おめでとうございます。整列完了です。✨";
    return;
  }

  if(state.phase === "SAVE"){
    hideRange();
    hint.innerHTML = `【保存】青わくの添字i = ${state.i + 1} のカード <b>${state.list[state.i]}</b> を下の hozon へ入れてください。`;
    return;
  }

  if(state.phase === "COMPARE_SHIFT"){
    showRange();
    const hozon = state.hozon;
    const compareVal = state.list[state.j];

    if(state.j >= 0 && state.list[state.j] < state.hozon){
      hint.innerHTML =
        `【挿入】list[${state.j + 1}] の値 <b>${compareVal}</b> は hozon の <b>${hozon}</b> より小さいです。` +
        `<br>右上の <b>↑添字j+1</b> の場所に hozon を入れてください。`;
    } else if(state.j >= 0){
      hint.innerHTML =
        `【比較】添字j = ${state.j + 1} のカードの下に hozon を置いています。` +
        `<br><b>${compareVal}</b> は <b>${hozon}</b> より小さくないので、list[${state.j + 1}] を右の list[${state.j + 2}] へずらしてください。`;
    } else {
      state.phase = "INSERT";
      render();
      return;
    }
    return;
  }

  if(state.phase === "INSERT"){
    hideRange();
    if(state.j >= 0){
      hint.innerHTML =
        `【挿入】下の赤い位置が <b>添字j</b>、hozon はその真下です。` +
        `<br>右上の <b>↑添字j+1</b> の場所に、hozon の <b>${state.hozon}</b> を入れてください。`;
    } else {
      hint.innerHTML =
        `【挿入】j が 1 まで来たので、次は <b>list[1] ← hozon</b> を行います。` +
        `<br>hozon はいちばん左のカードの下に残してあります。その真上の <b>list[1]</b> に入れてください。`;
    }
  }
}

function updateCodeHighlight(){
  if(state.i >= state.list.length){
    setActiveCodeLines([12]);
    return;
  }

  if(state.phase === "SAVE"){
    setActiveCodeLines([2,3]);
    return;
  }

  if(state.phase === "COMPARE_SHIFT"){
    if(state.j >= 0 && state.list[state.j] < state.hozon){
      setActiveCodeLines([4,5,6,7]);
    } else if(state.j >= 0){
      setActiveCodeLines([4,8,9,10]);
    } else {
      setActiveCodeLines([10,11]);
    }
    return;
  }

  if(state.phase === "INSERT"){
    if(state.j >= 0){
      setActiveCodeLines([5,6,7]);
    } else {
      setActiveCodeLines([10,11]);
    }
  }
}

function hideRange(){
  document.getElementById("j-range-highlight").style.display = "none";
  document.getElementById("j-range-label").style.display = "none";
}

function showRange(){
  const highlight = document.getElementById("j-range-highlight");
  const label = document.getElementById("j-range-label");
  const wrapper = document.getElementById("list-wrapper");
  const cards = document.querySelectorAll(".cell .card");

  let start = 0;
  let end = -1;

  if(state.phase === "COMPARE_SHIFT"){
    end = state.j;
  } else {
    end = -1;
  }

  if(end < start || !cards[start] || !cards[end]){
    hideRange();
    return;
  }

  const wrapperRect = wrapper.getBoundingClientRect();
  const startRect = cards[start].getBoundingClientRect();
  const endRect = cards[end].getBoundingClientRect();

  const left = startRect.left - wrapperRect.left - 10;
  const top = startRect.top - wrapperRect.top - 10;
  const width = endRect.right - startRect.left + 20;
  const height = startRect.height + 20;

  highlight.style.display = "block";
  highlight.style.left = `${Math.max(left, 12)}px`;
  highlight.style.top = `${top}px`;
  highlight.style.width = `${width}px`;
  highlight.style.height = `${height}px`;

  label.style.display = "block";
  label.style.left = `${Math.max(left + width / 2 - 82, 18)}px`;
  label.style.top = `${top - 56}px`;
}

function updateHozonPosition(){
  const hozonContainer = document.getElementById("hozon-container");
  const wrapper = document.getElementById("list-wrapper");
  const cards = document.querySelectorAll(".cell .card");
  if(!hozonContainer || !wrapper || cards.length === 0) return;

  let anchorIndex = 0;

  if(state.hozon === null){
    anchorIndex = Math.min(state.i, cards.length - 1);
  } else if(state.phase === "COMPARE_SHIFT" || state.phase === "INSERT"){
    anchorIndex = Math.max(state.j, 0);
  } else {
    anchorIndex = Math.min(state.i, cards.length - 1);
  }

  const anchorCard = cards[anchorIndex];
  if(!anchorCard) return;

  const wrapperRect = wrapper.getBoundingClientRect();
  const cardRect = anchorCard.getBoundingClientRect();
  const hozonWidth = hozonContainer.offsetWidth || 104;
  const centerX = cardRect.left - wrapperRect.left + cardRect.width / 2;
  const left = centerX - hozonWidth / 2;
  hozonContainer.style.left = `${Math.max(left, 18)}px`;
}

function getDropArea(target){
  let node = target;
  while(node && !node.classList?.contains("cell") && node.id !== "hozon-slot"){
    node = node.parentElement;
  }
  return node;
}

function drag(ev){
  ev.dataTransfer.setData("text/plain", ev.target.id);
}

function allowDrop(ev){
  ev.preventDefault();
  const area = getDropArea(ev.target);
  if(area) area.classList.add("drop-hover");
}

function clearHover(ev){
  const area = getDropArea(ev.target);
  if(area) area.classList.remove("drop-hover");
}

function triggerSortedFlash(endIndex){
  state.flashSortedUntil = endIndex;
  render();
  setTimeout(() => {
    state.flashSortedUntil = -1;
    render();
  }, 2000);
}

function drop(ev){
  ev.preventDefault();

  const hozonArea = getDropArea(ev.target);
  if(!hozonArea) return;
  hozonArea.classList.remove("drop-hover");

  const data = ev.dataTransfer.getData("text/plain");
  const draggedEl = document.getElementById(data);
  if(!draggedEl) return;

  const fromHozon = data === "card-hozon";
  const fromListIdx = fromHozon ? null : parseInt(data.replace("card-list-", ""), 10);
  const toHozon = hozonArea.id === "hozon-slot";
  const toListIdx = toHozon ? null : parseInt(hozonArea.dataset.idx, 10);

  if(state.phase === "SAVE" && toHozon && fromListIdx === state.i){
    saveHistory();
    state.hozon = state.list[state.i];
    state.j = state.i - 1;
    state.phase = "COMPARE_SHIFT";
    initCodePanel();
    render();
    return;
  }

  if(state.phase === "COMPARE_SHIFT" && fromListIdx === state.j && toListIdx === state.j + 1){
    if(state.list[state.j] < state.hozon) return;

    saveHistory();
    state.list[toListIdx] = state.list[fromListIdx];
    state.j -= 1;

    if(state.j < 0){
      state.phase = "INSERT";
    }
    initCodePanel();
    render();
    return;
  }

  if(state.phase === "COMPARE_SHIFT" && fromHozon && toListIdx === state.j + 1){
    if(!(state.j >= 0 && state.list[state.j] < state.hozon)) return;

    saveHistory();
    state.list[toListIdx] = state.hozon;
    state.hozon = null;
    const sortedEnd = state.i;
    state.i += 1;
    state.phase = "SAVE";
    initCodePanel();
    render();
    triggerSortedFlash(sortedEnd);
    return;
  }

  if(state.phase === "INSERT" && fromHozon && toListIdx === 0){
    saveHistory();
    state.list[0] = state.hozon;
    state.hozon = null;
    const sortedEnd = state.i;
    state.i += 1;
    state.phase = "SAVE";
    initCodePanel();
    render();
    triggerSortedFlash(sortedEnd);
  }
}

function getCss(name){
  return getComputedStyle(document.documentElement).getPropertyValue(name).trim();
}

window.addEventListener("resize", updateHozonPosition);

initGame();
</script>
